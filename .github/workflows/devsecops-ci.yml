name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TRABAJO 1: Pruebas unitarias y análisis estático de código (SAST)
  code-security-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ejecutar Pruebas Unitarias
      # Le indica a Python que busque los módulos en la carpeta raíz del proyecto
      env:
        PYTHONPATH: .
      run: python -m unittest discover -s tests

    - name: Ejecutar Pruebas Unitarias
      run: python -m unittest discover -s tests

    - name: Ejecutar Auditoría SAST con Bandit
      uses: PyCQA/bandit-action@v1
      with:
        severity: 'high'  # Detiene el pipeline si halla fallos graves

  # TRABAJO 2: Construcción y análisis de la imagen del contenedor (SCA)
  container-security:
    needs: code-security-and-test # Requiere que las pruebas de código pasen primero
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Construir Imagen Docker
      run: docker build -t secure-pipeline:latest .

    - name: Escanear Imagen con Trivy (Seguridad de Contenedores)
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: 'secure-pipeline:latest'
        format: 'table'
        exit-code: '1' # Falla el pipeline si encuentra vulnerabilidades críticas
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'
